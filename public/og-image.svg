<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#FAF9F4"/>
  <!-- Decorative dots -->
  <circle cx="150" cy="120" r="3" fill="#F5C518" opacity="0.3"/>
  <circle cx="1050" cy="500" r="3" fill="#F5C518" opacity="0.3"/>
  <circle cx="200" cy="450" r="2" fill="#F5C518" opacity="0.2"/>
  <circle cx="1000" cy="150" r="2" fill="#F5C518" opacity="0.2"/>
  <circle cx="600" cy="100" r="4" fill="#F5C518" opacity="0.15"/>
  <circle cx="350" cy="530" r="2.5" fill="#F5C518" opacity="0.2"/>
  <circle cx="850" cy="550" r="2" fill="#F5C518" opacity="0.15"/>
  <!-- Phone mockup outline -->
  <rect x="750" y="115" width="200" height="400" rx="40" fill="#0F0E0A"/>
  <rect x="760" y="125" width="180" height="380" rx="34" fill="#ECE5DD"/>
  <!-- WhatsApp header -->
  <rect x="760" y="125" width="180" height="44" rx="34" fill="#0B5345"/>
  <rect x="760" y="149" width="180" height="20" fill="#0B5345"/>
  <!-- Chat bubbles -->
  <rect x="770" y="180" width="120" height="30" rx="8" fill="white"/>
  <rect x="770" y="215" width="140" height="40" rx="8" fill="white"/>
  <rect x="790" y="260" width="110" height="25" rx="8" fill="#D9F7BE"/>
  <rect x="770" y="295" width="100" height="25" rx="8" fill="white"/>
  <!-- Flow UI box -->
  <rect x="770" y="330" width="160" height="100" rx="10" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="780" y="340" width="140" height="20" rx="6" fill="#E8F5E9" stroke="#25D366" stroke-width="1"/>
  <rect x="780" y="365" width="140" height="20" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="780" y="390" width="140" height="20" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Input bar -->
  <rect x="760" y="460" width="180" height="36" rx="0" fill="#F0F2F5"/>
  <rect x="770" y="467" width="130" height="22" rx="18" fill="white"/>
  <circle cx="920" cy="478" r="12" fill="#0B5345"/>
  <!-- Text content -->
  <text x="80" y="200" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="#18160E">Turn WhatsApp</text>
  <text x="80" y="270" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="#18160E">Into Your</text>
  <text x="80" y="340" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="#F5C518">Front Desk</text>
  <text x="80" y="400" font-family="system-ui, sans-serif" font-size="18" fill="#666" font-weight="400">Automate bookings, follow-ups & reminders</text>
  <text x="80" y="425" font-family="system-ui, sans-serif" font-size="18" fill="#666" font-weight="400">— all through WhatsApp.</text>
  <!-- Logo -->
  <text x="80" y="530" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#18160E">Lumenfly Labs</text>
  <text x="80" y="555" font-family="system-ui, sans-serif" font-size="13" fill="#999">lumenflylabs.com</text>
</svg>
